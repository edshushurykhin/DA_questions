<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DE Interview QA</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --top-bg: rgba(244, 247, 251, 0.92);
      --card: #ffffff;
      --muted: #5f6f8f;
      --text: #1a2235;
      --accent: #2563eb;
      --ok: #16a34a;
      --border: #d5deed;
      --input-bg: #ffffff;
      --button-bg: #eef3ff;
      --progress-bg: #e9effa;
      --section-text: #2b3a5f;
      --answer-text: #2c3955;
    }
    :root[data-theme="dark"] {
      --bg: #0b1020;
      --top-bg: rgba(11, 16, 32, 0.92);
      --card: #131a2e;
      --muted: #8ea0c7;
      --text: #e9eeff;
      --accent: #6ea8fe;
      --ok: #43d17a;
      --border: #233055;
      --input-bg: #0e1529;
      --button-bg: #0f1730;
      --progress-bg: #0f1730;
      --section-text: #cfe0ff;
      --answer-text: #d6e1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 16px 14px 36px;
      scroll-padding-top: 12px;
    }
    .top-wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      padding-top: env(safe-area-inset-top, 0);
      pointer-events: none;
    }
    .top-inner {
      pointer-events: auto;
      max-width: 840px;
      margin: 0 auto;
      padding: 0 14px;
    }
    body.header-collapsed .top-inner {
      display: none;
    }
    .top {
      position: relative;
      background: var(--top-bg);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 12px 12px;
      padding: 8px 0 10px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
    }
    .header-peek {
      display: none;
      pointer-events: auto;
      position: relative;
      z-index: 21;
      margin: -4px auto 0;
      width: max-content;
      max-width: calc(100% - 28px);
      border: 1px solid var(--border);
      border-top: none;
      background: var(--card);
      color: var(--text);
      border-radius: 0 0 10px 10px;
      padding: 4px 16px 8px;
      font-size: 0.78rem;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }
    body.header-collapsed .header-peek {
      display: block;
    }
    .toc-row {
      margin-bottom: 8px;
    }
    .toc-row label {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    #tocSelect {
      width: 100%;
    }
    h1 {
      font-size: 1.1rem;
      margin: 0 0 10px;
    }
    .meta {
      color: var(--muted);
      font-size: .92rem;
      margin-bottom: 10px;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      outline: none;
    }
    select {
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .95rem;
    }
    button {
      border: 1px solid var(--border);
      background: var(--button-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: .95rem;
    }
    .progress {
      width: 100%;
      height: 8px;
      background: var(--progress-bg);
      border: 1px solid var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--ok));
      transition: width .2s ease;
    }
    .section {
      margin: 18px 0 8px;
      font-size: 1rem;
      color: var(--section-text);
      scroll-margin-top: 12px;
    }
    html {
      scroll-padding-top: 100px;
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      padding: 12px;
      margin-bottom: 10px;
    }
    .qrow {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 8px;
      align-items: start;
      margin-bottom: 8px;
    }
    .qtext {
      font-weight: 600;
      line-height: 1.35;
    }
    .qtext strong {
      font-weight: 700;
      color: var(--text);
    }
    .answer {
      color: var(--answer-text);
      line-height: 1.45;
      white-space: pre-wrap;
      font-size: .96rem;
    }
    .answer strong { color: var(--text); }
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 10px;
    }
    @media (max-width: 560px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
    :root[data-theme="dark"] .top {
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
    }
    :root[data-theme="dark"] .header-peek {
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div class="wrap" id="pageWrap">
    <div class="top-wrap" id="topWrap">
      <div class="top-inner">
        <div id="topPanel" class="top">
          <h1>Data Engineer Interview Checklist</h1>
          <div id="meta" class="meta">Загрузка вопросов...</div>
          <div class="toc-row">
            <label for="tocSelect">К разделу</label>
            <select id="tocSelect" aria-label="Перейти к разделу">
              <option value="">— выберите раздел —</option>
            </select>
          </div>
          <div class="controls">
            <input id="search" type="search" placeholder="Поиск по вопросу/ответу">
            <select id="themeSelect" aria-label="Выбор темы">
              <option value="auto">Тема: Auto</option>
              <option value="light">Тема: Light</option>
              <option value="dark">Тема: Dark</option>
            </select>
            <button id="resetBtn" type="button">Сброс</button>
          </div>
          <div class="progress"><div id="bar" class="bar"></div></div>
        </div>
      </div>
      <button type="button" id="headerPeek" class="header-peek" aria-label="Показать панель">Панель</button>
    </div>

    <div id="content"></div>
  </div>

  <script>
    const MD_PATH = "DE_INTERVIEW_QA.md";
    const STORAGE_PREFIX = "de_qa_checked_v1:";
    const THEME_KEY = "de_qa_theme_v1";

    function applyTheme(theme) {
      const root = document.documentElement;
      if (theme === "dark") {
        root.setAttribute("data-theme", "dark");
        return;
      }
      if (theme === "light") {
        root.removeAttribute("data-theme");
        return;
      }
      const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (prefersDark) root.setAttribute("data-theme", "dark");
      else root.removeAttribute("data-theme");
    }

    function initTheme() {
      const saved = localStorage.getItem(THEME_KEY) || "auto";
      const select = document.getElementById("themeSelect");
      select.value = saved;
      applyTheme(saved);
      select.addEventListener("change", () => {
        const val = select.value;
        localStorage.setItem(THEME_KEY, val);
        applyTheme(val);
      });
      window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => {
        if ((localStorage.getItem(THEME_KEY) || "auto") === "auto") applyTheme("auto");
      });
    }

    function hashString(s) {
      let h = 5381;
      for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
      return (h >>> 0).toString(36);
    }

    function parseMarkdown(md) {
      const lines = md.replace(/\r/g, "").split("\n");
      const items = [];
      let section = "Без раздела";
      let cur = null;

      const pushCur = () => {
        if (!cur) return;
        cur.answer = cur.answerLines.join("\n").trim();
        delete cur.answerLines;
        items.push(cur);
        cur = null;
      };

      for (const raw of lines) {
        const line = raw.trimEnd();

        const h2 = line.match(/^##\s+(.+)$/);
        if (h2) {
          pushCur();
          section = h2[1].trim();
          continue;
        }

        const q = line.match(/^- \[[ xX]\]\s+(.+)$/);
        if (q) {
          pushCur();
          cur = {
            section,
            question: q[1].trim(),
            answerLines: []
          };
          continue;
        }

        if (!cur) continue;

        if (line.startsWith("Ответ:")) {
          cur.answerLines.push(line.replace(/^Ответ:\s*/, ""));
        } else if (line.trim() === "") {
          cur.answerLines.push("");
        } else if (!line.startsWith("---")) {
          cur.answerLines.push(line.replace(/^\s*-\s+/, "").replace(/^\s{2}/, ""));
        }
      }
      pushCur();
      return items;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /** Рендерит только inline **жирный** из Markdown (остальное экранируется). */
    function mdInlineToSafeHtml(s) {
      if (s == null || s === "") return "";
      const str = String(s);
      const delimCount = (str.match(/\*\*/g) || []).length;
      if (delimCount % 2 === 1) return escapeHtml(str);
      const parts = str.split("**");
      if (parts.length < 2) return escapeHtml(str);
      let out = "";
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) out += escapeHtml(parts[i]);
        else out += "<strong>" + escapeHtml(parts[i]) + "</strong>";
      }
      return out;
    }

    function getKey(item) {
      return STORAGE_PREFIX + hashString(item.section + "::" + item.question);
    }

    function isChecked(item) {
      return localStorage.getItem(getKey(item)) === "1";
    }

    function setChecked(item, val) {
      localStorage.setItem(getKey(item), val ? "1" : "0");
    }

    function setMeta(items) {
      const total = items.length;
      const done = items.filter(isChecked).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById("meta").textContent =
        `Пройдено: ${done}/${total} (${pct}%)`;
      document.getElementById("bar").style.width = pct + "%";
    }

    function sectionDomId(section) {
      return "sec-" + hashString(section);
    }

    function fillToc(items) {
      const sel = document.getElementById("tocSelect");
      const seen = new Set();
      sel.innerHTML = "";
      const opt0 = document.createElement("option");
      opt0.value = "";
      opt0.textContent = "— выберите раздел —";
      sel.appendChild(opt0);
      for (const it of items) {
        if (seen.has(it.section)) continue;
        seen.add(it.section);
        const o = document.createElement("option");
        o.value = sectionDomId(it.section);
        o.textContent = it.section;
        sel.appendChild(o);
      }
    }

    function updateHeaderSpacer() {
      const wrap = document.getElementById("pageWrap");
      const tw = document.getElementById("topWrap");
      if (!wrap || !tw) return;
      const collapsed = document.body.classList.contains("header-collapsed");
      const pad = collapsed
        ? Math.ceil((document.getElementById("headerPeek")?.offsetHeight || 28) + 14)
        : Math.ceil(tw.getBoundingClientRect().height + 12);
      wrap.style.paddingTop = pad + "px";
    }

    function expandHeader() {
      if (!document.body.classList.contains("header-collapsed")) return;
      document.body.classList.remove("header-collapsed");
      updateHeaderSpacer();
    }

    function initHeaderSpacerObserver() {
      const tw = document.getElementById("topWrap");
      const tp = document.getElementById("topPanel");
      if (!tw) return;
      const run = () => updateHeaderSpacer();
      if (typeof ResizeObserver !== "undefined") {
        const ro = new ResizeObserver(run);
        ro.observe(tw);
        if (tp) ro.observe(tp);
      }
      window.addEventListener("resize", run, { passive: true });
      queueMicrotask(run);
    }

    function initHeaderScrollHide() {
      let lastY = window.scrollY || 0;
      let ticking = false;
      const peek = document.getElementById("headerPeek");
      peek.addEventListener("click", () => {
        expandHeader();
        window.scrollTo({ top: 0, behavior: "smooth" });
      });

      const onScroll = () => {
        const y = window.scrollY || 0;
        const dy = y - lastY;
        if (y < 24) {
          expandHeader();
        } else if (dy > 6 && y > 72) {
          if (!document.body.classList.contains("header-collapsed")) {
            document.body.classList.add("header-collapsed");
            updateHeaderSpacer();
          }
        } else if (dy < -6) {
          if (document.body.classList.contains("header-collapsed")) {
            document.body.classList.remove("header-collapsed");
            updateHeaderSpacer();
          }
        }
        lastY = y;
        ticking = false;
      };

      window.addEventListener(
        "scroll",
        () => {
          if (!ticking) {
            ticking = true;
            requestAnimationFrame(onScroll);
          }
        },
        { passive: true }
      );
    }

    function render(items, query = "") {
      const q = query.trim().toLowerCase();
      const filtered = q
        ? items.filter(i =>
            i.question.toLowerCase().includes(q) ||
            i.answer.toLowerCase().includes(q) ||
            i.section.toLowerCase().includes(q))
        : items;

      const content = document.getElementById("content");
      content.innerHTML = "";

      if (!filtered.length) {
        content.innerHTML = `<div class="empty">Ничего не найдено</div>`;
        setMeta(items);
        updateHeaderSpacer();
        return;
      }

      let currentSection = "";
      for (const item of filtered) {
        if (item.section !== currentSection) {
          currentSection = item.section;
          const h = document.createElement("div");
          h.className = "section";
          h.id = sectionDomId(item.section);
          h.textContent = currentSection;
          content.appendChild(h);
        }

        const card = document.createElement("div");
        card.className = "card";

        const qrow = document.createElement("div");
        qrow.className = "qrow";

        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = isChecked(item);
        cb.addEventListener("change", () => {
          setChecked(item, cb.checked);
          setMeta(items);
        });

        const qt = document.createElement("div");
        qt.className = "qtext";
        qt.innerHTML = mdInlineToSafeHtml(item.question);

        qrow.appendChild(cb);
        qrow.appendChild(qt);

        const ans = document.createElement("div");
        ans.className = "answer";
        ans.innerHTML = mdInlineToSafeHtml(item.answer || "Ответ не найден.");

        card.appendChild(qrow);
        card.appendChild(ans);
        content.appendChild(card);
      }

      setMeta(items);
      updateHeaderSpacer();
    }

    async function main() {
      try {
        initTheme();
        const md = await fetch(MD_PATH, { cache: "no-store" }).then(r => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.text();
        });
        const items = parseMarkdown(md);
        fillToc(items);
        initHeaderSpacerObserver();
        initHeaderScrollHide();
        render(items);

        const search = document.getElementById("search");
        search.addEventListener("input", () => render(items, search.value));

        document.getElementById("tocSelect").addEventListener("change", e => {
          const id = e.target.value;
          if (!id) return;
          document.body.classList.remove("header-collapsed");
          updateHeaderSpacer();
          search.value = "";
          render(items, "");
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              const el = document.getElementById(id);
              if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
            });
          });
          e.target.value = "";
        });

        document.getElementById("resetBtn").addEventListener("click", () => {
          if (!confirm("Сбросить все галочки?")) return;
          for (const it of items) localStorage.removeItem(getKey(it));
          render(items, search.value);
        });
      } catch (e) {
        document.getElementById("meta").textContent =
          "Ошибка загрузки DE_INTERVIEW_QA.md";
        document.getElementById("content").innerHTML =
          `<div class="empty">${String(e)}</div>`;
      }
    }

    main();
  </script>
</body>
</html>
